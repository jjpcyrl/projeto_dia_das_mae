<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💐 Sua Surpresa — Dia das Mães</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/surpresa.css" />
</head>
<body>

  <!-- Pétalas de fundo -->
  <div class="petal-bg" id="petal-bg"></div>
  <div class="bg-hearts" id="bg-hearts"></div>

  <!-- ═════════════════════════════════════════════
       ESTADO: Loading
  ═════════════════════════════════════════════ -->
  <div id="state-loading" class="state-screen">
    <div class="loading-box">
      <div class="loading-flower">💐</div>
      <p class="loading-msg">Abrindo sua surpresa…</p>
      <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
    </div>
  </div>

  <!-- ═════════════════════════════════════════════
       ESTADO: Erro (surpresa não encontrada)
  ═════════════════════════════════════════════ -->
  <div id="state-erro" class="state-screen" style="display:none">
    <div class="erro-box card fade-up">
      <span style="font-size:52px">😔</span>
      <h2 class="erro-titulo">Surpresa não encontrada</h2>
      <p class="erro-sub">O link pode estar errado ou expirado.</p>
      <a href="/" class="btn btn-rose">← Criar uma nova surpresa</a>
    </div>
  </div>

  <!-- ═════════════════════════════════════════════
       ESTADO: Surpresa — tela de abertura
  ═════════════════════════════════════════════ -->
  <div id="state-intro" class="state-screen" style="display:none">
    <div class="intro-box">
      <div class="intro-flower">💐</div>
      <h1 class="intro-title">
        Olá, <em id="intro-nome-mae"></em>!<br />
        Você recebeu uma surpresa.
      </h1>
      <p class="intro-sub">De alguém que te ama muito 🌸</p>
      <button class="btn btn-rose intro-btn" onclick="abrirSurpresa()">
        <span>Abrir minha surpresa</span>
        <span class="coracaoAnim">❤️</span>
      </button>
    </div>
  </div>

  <!-- ═════════════════════════════════════════════
       ESTADO: Conteúdo da surpresa
  ═════════════════════════════════════════════ -->
  <div id="state-surpresa" class="state-screen" style="display:none">
    <div class="surpresa-wrap">

      <!-- Cabeçalho -->
      <div class="surpresa-header fade-up">
        <span class="surpresa-icon">🌺</span>
        <p class="surpresa-de">Uma mensagem especial de</p>
        <h2 class="surpresa-filho" id="s-nome-filho"></h2>
        <p class="surpresa-para">Para <strong id="s-nome-mae"></strong>, com muito amor 💐</p>
      </div>

      <!-- Vídeo -->
      <div class="surpresa-video-wrap card fade-up delay-1">
        <video
          id="s-video"
          class="surpresa-video"
          controls
          playsinline
          preload="metadata"
        ></video>
      </div>

      <!-- Mensagem com efeito máquina de escrever -->
      <div class="surpresa-msg-card card fade-up delay-2">
        <span class="quote open">"</span>
        <p class="surpresa-msg" id="s-mensagem"></p>
        <span class="typing-cursor" id="typing-cursor">|</span>
        <span class="quote close">"</span>
      </div>

      <!-- Data -->
      <p class="surpresa-data fade-up delay-3" id="s-data"></p>

      <!-- Botão reviver -->
      <div class="surpresa-footer fade-up delay-4">
        <button class="btn btn-outline" onclick="reviver()">💫 Reviver esse momento</button>
        <a href="/" class="btn btn-rose">➕ Criar sua própria surpresa</a>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="/js/surpresa.js"></script>
</body>
</html>
